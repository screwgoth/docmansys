<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - DocManSys Admin</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            background: var(--bg-primary);
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .table-title {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-primary);
        }

        th {
            padding: 16px 24px;
            text-align: left;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        td {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            color: #cbd5e1;
            font-size: 14px;
        }

        tbody tr:hover {
            background: var(--border-color);
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-primary);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .role-badge.admin {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status-badge.inactive {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-secondary);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-title {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .empty-state {
            padding: 60px 40px;
            text-align: center;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
            }

            th, td {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <a href="/dashboard.html" class="logo">
            <div class="logo-icon">📄</div>
            <span>DocManSys</span>
        </a>

        <nav class="nav-menu">
            <a href="/dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="/documents.html" class="nav-item">
                <span class="nav-icon">📁</span>
                <span>Documents</span>
            </a>
            <a href="/upload.html" class="nav-item">
                <span class="nav-icon">⬆️</span>
                <span>Upload</span>
            </a>
            <a href="/admin/index.html" class="nav-item active">
                <span class="nav-icon">⚙️</span>
                <span>Admin</span>
            </a>
        </nav>

        <div class="user-section">
            <div class="user-profile" onclick="logout()">
                <div class="avatar" id="user-avatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="user-name">User</div>
                    <div class="user-role" id="user-role">Admin</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>User Management</h1>
      <button class="theme-toggle-btn" onclick="toggleTheme()" style="position: absolute; right: 2rem; top: 1.2rem; padding: 0.5rem 1rem; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Dark Mode</span>
      </button>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add User</button>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">All Users</div>
            </div>

            <table id="users-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div class="loading"></div>
                            <p>Loading users...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit User Modal -->
    <div class="modal" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Add User</h2>
            </div>

            <form id="user-form">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" required>
                </div>

                <div class="form-group">
                    <label for="role">Role *</label>
                    <select id="role" required>
                        <option value="viewer">Viewer</option>
                        <option value="uploader">Uploader</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        checkAuth();

        const user = getUser();
        if (user) {
            document.getElementById('user-name').textContent = user.username;
            document.getElementById('user-role').textContent = user.role || 'User';
            document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();
        }

        // Check admin access
        if (!user || (user.role !== 'admin' && user.role !== 'superadmin')) {
            showToast('Admin access required', 'error');
            setTimeout(() => window.location.href = '/dashboard.html', 2000);
        }

        let users = [];
        let editingUserId = null;

        async function loadUsers() {
            try {
                const data = await apiRequest('/api/admin/users');
                
                if (data && data.users) {
                    users = data.users;
                    displayUsers();
                }
            } catch (error) {
                console.error('Error loading users:', error);
                showToast('Failed to load users', 'error');
            }
        }

        function displayUsers() {
            const tbody = document.getElementById('users-tbody');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <p>No users found</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar-small">${u.username.charAt(0).toUpperCase()}</div>
                            <span>${u.username}</span>
                        </div>
                    </td>
                    <td>${u.email || '-'}</td>
                    <td><span class="role-badge ${u.role === 'admin' ? 'admin' : ''}">${u.role || 'user'}</span></td>
                    <td><span class="status-badge ${u.is_active ? 'active' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>${formatDate(u.created_at)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-secondary btn-small" onclick="editUser('${u.id}')">Edit</button>
                            <button class="btn btn-secondary btn-small" onclick="toggleUserStatus('${u.id}', ${u.is_active})">${u.is_active ? 'Disable' : 'Enable'}</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            editingUserId = null;
            document.getElementById('modal-title').textContent = 'Add User';
            document.getElementById('user-form').reset();
            document.getElementById('user-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('user-modal').classList.remove('show');
        }

        function editUser(userId) {
            const u = users.find(user => user.id === userId);
            if (!u) return;

            editingUserId = userId;
            document.getElementById('modal-title').textContent = 'Edit User';
            document.getElementById('username').value = u.username;
            document.getElementById('email').value = u.email || '';
            document.getElementById('password').value = '';
            document.getElementById('password').required = false;
            document.getElementById('role').value = u.role || 'viewer';
            document.getElementById('user-modal').classList.add('show');
        }

        async function toggleUserStatus(userId, currentStatus) {
            const action = currentStatus ? 'disable' : 'enable';
            if (!confirm(`Are you sure you want to ${action} this user?`)) return;

            try {
                await apiRequest(`/api/admin/users/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        is_active: !currentStatus
                    }),
                });

                showToast(`User ${action}d successfully`, 'success');
                loadUsers();
            } catch (error) {
                showToast(`Failed to ${action} user`, 'error');
            }
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value || null,
                role: document.getElementById('role').value,
            };

            const password = document.getElementById('password').value;
            if (password) {
                userData.password = password;
            }

            try {
                if (editingUserId) {
                    await apiRequest(`/api/admin/users/${editingUserId}`, {
                        method: 'PUT',
                        body: JSON.stringify(userData),
                    });
                    showToast('User updated successfully', 'success');
                } else {
                    if (!password) {
                        showToast('Password is required for new users', 'error');
                        return;
                    }

                    await apiRequest('/api/admin/users', {
                        method: 'POST',
                        body: JSON.stringify(userData),
                    });
                    showToast('User created successfully', 'success');
                }

                closeModal();
                loadUsers();
            } catch (error) {
                showToast(error.message || 'Failed to save user', 'error');
            }
        });

        // Close modal on outside click
        document.getElementById('user-modal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        loadUsers();
    </script>
</body>
</html>
