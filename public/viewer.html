<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer - DocManSys</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            background: #0f172a;
            overflow: hidden;
        }

        .viewer-container {
            display: flex;
            height: 100vh;
        }

        .viewer-sidebar {
            width: 320px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 24px;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 36px;
            height: 36px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #475569;
        }

        .doc-header {
            margin-bottom: 24px;
        }

        .doc-title {
            color: #f8fafc;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            word-wrap: break-word;
        }

        .doc-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .doc-section {
            margin-bottom: 24px;
        }

        .section-title {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #94a3b8;
            font-weight: 500;
        }

        .doc-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #334155;
            border: none;
            border-radius: 8px;
            color: #cbd5e1;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            justify-content: center;
        }

        .action-btn:hover {
            background: #475569;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .action-btn.danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .action-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .viewer-main {
            flex: 1;
            background: #0f172a;
            padding: 24px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .viewer-content {
            max-width: 1200px;
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }

        .viewer-content iframe {
            width: 100%;
            height: calc(100vh - 100px);
            border: none;
        }

        .viewer-content img {
            width: 100%;
            display: block;
        }

        .unsupported-type {
            padding: 60px 40px;
            text-align: center;
            color: #64748b;
        }

        .loading-viewer {
            padding: 60px 40px;
            text-align: center;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .viewer-container {
                flex-direction: column;
            }

            .viewer-sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }

            .viewer-main {
                height: 60vh;
            }
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <!-- Sidebar -->
        <div class="viewer-sidebar">
            <button class="close-btn" onclick="closeViewer()">✕</button>

            <div class="doc-header">
                <h1 class="doc-title" id="doc-title">Loading...</h1>
                <span class="doc-badge" id="doc-type">-</span>
            </div>

            <div class="doc-section">
                <h3 class="section-title">Details</h3>
                <div class="info-row">
                    <span class="info-label">File Size</span>
                    <span id="doc-size">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Upload Date</span>
                    <span id="doc-date">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Uploaded By</span>
                    <span id="doc-uploader">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">File Type</span>
                    <span id="doc-mime">-</span>
                </div>
            </div>

            <div class="doc-section" id="description-section" style="display: none;">
                <h3 class="section-title">Description</h3>
                <p style="color: #cbd5e1; font-size: 14px; line-height: 1.6;" id="doc-description"></p>
            </div>

            <div class="doc-section">
                <h3 class="section-title">Actions</h3>
                <div class="doc-actions">
                    <a href="#" class="action-btn primary" id="download-btn" target="_blank">
                        <span>⬇️</span>
                        <span>Download</span>
                    </a>
                    <button class="action-btn" onclick="shareDocument()">
                        <span>🔗</span>
                        <span>Share Link</span>
                    </button>
                    <button class="action-btn danger" onclick="deleteDocument()" id="delete-btn" style="display: none;">
                        <span>🗑️</span>
                        <span>Delete</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Viewer -->
        <div class="viewer-main">
            <div class="viewer-content" id="viewer-content">
                <div class="loading-viewer">
                    <div class="loading"></div>
                    <p>Loading document...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const documentId = urlParams.get('id');

        if (!documentId) {
            showToast('No document ID provided', 'error');
            setTimeout(() => window.location.href = '/documents.html', 2000);
        }

        const user = getUser();
        const isAdmin = user && (user.role === 'admin' || user.role === 'superadmin');

        if (isAdmin) {
            document.getElementById('delete-btn').style.display = 'flex';
        }

        async function loadDocument() {
            try {
                const doc = await apiRequest(`/api/documents/${documentId}`);
                
                if (doc) {
                    displayDocument(doc);
                }
            } catch (error) {
                console.error('Error loading document:', error);
                showToast('Failed to load document', 'error');
                setTimeout(() => window.location.href = '/documents.html', 2000);
            }
        }

        function displayDocument(doc) {
            // Update sidebar info
            document.getElementById('doc-title').textContent = doc.original_filename || doc.filename || 'Untitled';
            document.getElementById('doc-type').textContent = doc.document_type || 'OTHER';
            document.getElementById('doc-size').textContent = formatFileSize(doc.size || 0);
            document.getElementById('doc-date').textContent = formatDate(doc.uploaded_at);
            document.getElementById('doc-uploader').textContent = doc.uploaded_by || 'Unknown';
            document.getElementById('doc-mime').textContent = doc.mime_type || 'Unknown';

            if (doc.description) {
                document.getElementById('description-section').style.display = 'block';
                document.getElementById('doc-description').textContent = doc.description;
            }

            const token = getToken();
            const downloadUrl = `/api/documents/${documentId}/download?token=${token}`;
            document.getElementById('download-btn').href = downloadUrl;

            // Display document content
            displayContent(doc, downloadUrl);
        }

        function displayContent(doc, downloadUrl) {
            const container = document.getElementById('viewer-content');
            const mimeType = doc.mime_type || '';

            // PDF
            if (mimeType === 'application/pdf') {
                container.innerHTML = `<iframe src="${downloadUrl}" type="application/pdf"></iframe>`;
            }
            // Images
            else if (mimeType.startsWith('image/')) {
                container.innerHTML = `<img src="${downloadUrl}" alt="${doc.original_filename}">`;
            }
            // Text files
            else if (mimeType.startsWith('text/')) {
                fetch(downloadUrl)
                    .then(res => res.text())
                    .then(text => {
                        container.innerHTML = `<pre style="padding: 24px; color: #cbd5e1; font-size: 13px; line-height: 1.6; overflow: auto;">${escapeHtml(text)}</pre>`;
                    })
                    .catch(() => {
                        showUnsupported(container);
                    });
            }
            // Unsupported types
            else {
                showUnsupported(container);
            }
        }

        function showUnsupported(container) {
            container.innerHTML = `
                <div class="unsupported-type">
                    <div style="font-size: 64px; margin-bottom: 16px;">📄</div>
                    <h3 style="color: #f8fafc; margin-bottom: 8px;">Preview not available</h3>
                    <p>This file type cannot be previewed in the browser</p>
                    <p style="margin-top: 16px;">Please download the file to view it</p>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeViewer() {
            window.location.href = '/documents.html';
        }

        function shareDocument() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!', 'success');
            }).catch(() => {
                showToast('Failed to copy link', 'error');
            });
        }

        async function deleteDocument() {
            if (!confirm('Are you sure you want to delete this document? This action cannot be undone.')) {
                return;
            }

            try {
                await apiRequest(`/api/documents/${documentId}`, {
                    method: 'DELETE',
                });

                showToast('Document deleted successfully', 'success');
                setTimeout(() => window.location.href = '/documents.html', 1500);
            } catch (error) {
                console.error('Error deleting document:', error);
                showToast('Failed to delete document', 'error');
            }
        }

        // Load document on page load
        loadDocument();
    </script>
</body>
</html>
